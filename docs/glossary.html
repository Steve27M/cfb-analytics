<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GRIDIRONIQ — Stat Guide</title>
<meta name="description" content="A plain-English data dictionary for every metric on the GRIDIRONIQ college-football dashboard: what each stat means, how to read it, and the 2025 FBS range.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Saira+Condensed:wght@500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --a:#3ddc84; --a2:#1c7a49; --aText:#04120a;
    --bg:#06070a; --text:#f3f6fb; --sub:#8a96a8; --border:rgba(255,255,255,.09);
    --panel:#12151d; --panel2:#0c0e14; --good:#3ddc84; --bad:#ff6b6b;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;
    background:radial-gradient(140% 55% at 50% 0%,color-mix(in srgb,var(--a) 15%,var(--bg)) 0%,var(--bg) 52%);
    background-attachment:fixed;padding-bottom:70px;}
  a{color:inherit;text-decoration:none;}
  ::-webkit-scrollbar{width:11px;height:11px;}
  ::-webkit-scrollbar-track{background:#0c0e13;}
  ::-webkit-scrollbar-thumb{background:#242833;border-radius:6px;}
  .wrap{max-width:1120px;margin:0 auto;padding:0 26px;}
  /* nav */
  .nav{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(8,9,13,.82);border-bottom:1px solid var(--border);}
  .nav .in{display:flex;align-items:center;gap:20px;padding:12px 26px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:9px;}
  .brand .bar{width:9px;height:26px;border-radius:3px;background:linear-gradient(var(--a),var(--a2));}
  .brand .txt{font:800 15px 'Saira Condensed';letter-spacing:.14em;}
  .navlinks{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto;}
  .navlinks a{font:600 12px 'Space Grotesk';letter-spacing:.04em;color:var(--sub);padding:7px 12px;border-radius:8px;}
  .navlinks a:hover{color:var(--text);background:var(--panel);}
  .navlinks a.active{color:var(--aText);background:var(--a);}
  /* hero */
  .hero{padding:44px 0 8px;}
  .hero .eyebrow{font:600 12px 'Space Grotesk';letter-spacing:.22em;color:var(--a);text-transform:uppercase;}
  .hero h1{font:400 clamp(40px,6vw,68px)/.92 'Anton';text-transform:uppercase;margin:10px 0 0;}
  .hero p{font:400 16px/1.6 'Space Grotesk';color:var(--sub);max-width:680px;margin:14px 0 0;}
  /* search */
  .toolbar{display:flex;gap:12px;align-items:center;margin:26px 0 6px;flex-wrap:wrap;}
  .search{flex:1;min-width:220px;display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:11px 15px;}
  .search input{flex:1;background:none;border:none;outline:none;color:var(--text);font:500 15px 'Space Grotesk';}
  .search input::placeholder{color:var(--sub);}
  .count{font:600 12px 'JetBrains Mono';color:var(--sub);white-space:nowrap;}
  /* section */
  .sec{display:flex;align-items:center;gap:12px;margin:38px 0 16px;}
  .sec h2{font:400 22px 'Anton';letter-spacing:.02em;text-transform:uppercase;margin:0;}
  .sec .line{flex:1;height:1px;background:var(--border);}
  /* cards */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .card{border-radius:16px;border:1px solid var(--border);background:var(--panel);padding:18px 20px;
    display:flex;flex-direction:column;gap:10px;}
  .card .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .card .name{font:400 21px 'Anton';text-transform:uppercase;letter-spacing:.01em;}
  .badge{font:700 10px 'Space Grotesk';letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:999px;border:1px solid var(--border);color:var(--sub);white-space:nowrap;}
  .badge.good{color:var(--aText);background:var(--a);border-color:var(--a);}
  .badge.low{color:#04120a;background:#7cc4ff;border-color:#7cc4ff;}
  .badge.rank{color:#04120a;background:#ffd166;border-color:#ffd166;}
  .card .def{font:400 14px/1.6 'Space Grotesk';color:var(--text);}
  .card .read{font:400 13px/1.6 'Space Grotesk';color:var(--sub);border-left:2px solid var(--a);padding-left:12px;}
  .card .read b{color:var(--text);font-weight:600;}
  /* distribution bar */
  .dist{margin-top:2px;}
  .dist .track{position:relative;height:10px;border-radius:5px;background:linear-gradient(90deg,var(--panel2),color-mix(in srgb,var(--a) 30%,var(--panel2)));border:1px solid var(--border);}
  .dist .med{position:absolute;top:-3px;width:2px;height:16px;background:var(--text);border-radius:2px;}
  .dist .ends{display:flex;justify-content:space-between;margin-top:7px;font:600 11px 'JetBrains Mono';color:var(--sub);}
  .dist .ex{display:flex;justify-content:space-between;gap:8px;margin-top:9px;font:500 11px 'Space Grotesk';}
  .dist .ex .chip{display:flex;align-items:center;gap:6px;color:var(--sub);}
  .dist .ex .chip b{font:700 12px 'Saira Condensed';color:var(--text);}
  .dist .ex .dot{width:7px;height:7px;border-radius:2px;}
  .empty{grid-column:1/-1;text-align:center;color:var(--sub);font:500 14px 'Space Grotesk';padding:40px;}
  footer{margin-top:44px;font:500 12px/1.7 'Space Grotesk';color:var(--sub);}
  footer a{color:var(--a);}
  @media(max-width:760px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="nav"><div class="in">
  <a class="brand" href="index.html"><span class="bar"></span><span class="txt">GRIDIRON<span style="color:var(--a);">IQ</span></span></a>
  <div class="navlinks">
    <a href="compare.html">Compare Teams</a>
    <a href="glossary.html" class="active">Stat Guide</a>
    <a href="models.html">The Models</a>
    <a href="index.html">Dashboard</a>
    <a href="https://github.com/Steve27M/cfb-analytics" target="_blank" rel="noopener">GitHub ↗</a>
  </div>
</div></div>

<div class="wrap">
  <div class="hero">
    <div class="eyebrow">Data Dictionary</div>
    <h1>Stat Guide</h1>
    <p id="sub"></p>
  </div>

  <div class="toolbar">
    <div class="search">
      <span style="color:var(--sub);font-size:15px;">🔎</span>
      <input id="q" type="text" placeholder="Search a stat — e.g. EPA, success rate, schedule…" autocomplete="off">
    </div>
    <span class="count" id="count"></span>
  </div>

  <div id="body"></div>

  <footer>
    Distributions reflect the <span id="fseason"></span> FBS season from the
    <a href="https://github.com/Steve27M/cfb-analytics" target="_blank" rel="noopener">cfb-analytics</a> warehouse.
    Data: CollegeFootballData.com. Want to see how the projections are built?
    <a href="models.html">Read about the models →</a>
  </footer>
</div>

<script>
const DATA = {"season": 2025, "nTeams": 136, "groups": [{"name": "Team Rating & Record", "stats": [{"name": "SP+ Rating", "def": "A tempo- and opponent-adjusted rating expressed in points: the margin a team would be expected to win (or lose) by against a perfectly average FBS team on a neutral field.", "read": "Positive is above average, negative below. A team rated +20 facing one rated +5 is favored by ~15 on a neutral field. This is the single best summary of team strength on the dashboard and drives the matchup projection.", "dir": "high", "dist": {"min": -36.6, "med": 1.6, "max": 32.4, "hi": {"name": "Indiana", "abbr": "IU", "val": 32.4}, "lo": {"name": "Massachusetts", "abbr": "MASS", "val": -36.6}}, "dec": 1}, {"name": "SP+ Rank", "def": "The team's rank (1 = best) among all FBS teams by SP+ rating.", "read": "1 through ~136. Shown as the 'SP+ #' chip on the hero card.", "dir": "rank"}, {"name": "Record", "def": "Wins\u2013losses over the season (FBS games with a resolved result).", "read": "Context, not a ranking input \u2014 a 10\u20132 team in a weak league can rate below an 8\u20134 team in a brutal one. Read it next to Strength of Schedule.", "dir": "high"}, {"name": "Win %", "def": "Share of games won.", "read": "0 to 1. Feeds the win-probability models as win_pct_diff between two teams.", "dir": "high", "dist": {"min": 0.0, "med": 0.538, "max": 1.0, "hi": {"name": "Indiana", "abbr": "IU", "val": 1.0}, "lo": {"name": "Massachusetts", "abbr": "MASS", "val": 0.0}}, "dec": 3}]}, {"name": "Scoring & Yardage", "stats": [{"name": "Points / Game", "def": "Average points scored per game.", "read": "Raw output \u2014 not schedule-adjusted, so pad it against Strength of Schedule. Combined with the opponent's Points Allowed to project a game's total.", "dir": "high", "dist": {"min": 11.1, "med": 27.6, "max": 45.1, "hi": {"name": "North Texas", "abbr": "UNT", "val": 45.1}, "lo": {"name": "Massachusetts", "abbr": "MASS", "val": 11.1}}, "dec": 1}, {"name": "Points Allowed", "def": "Average points surrendered per game.", "read": "Lower is better. A defense-first team can have a low SP+-beating profile here.", "dir": "low", "dist": {"min": 9.3, "med": 24.9, "max": 38.6, "hi": {"name": "Massachusetts", "abbr": "MASS", "val": 38.6}, "lo": {"name": "Ohio State", "abbr": "OSU", "val": 9.3}}, "dec": 1}, {"name": "Yards / Game", "def": "Average total offensive yards per game.", "read": "Volume, not efficiency \u2014 a fast-tempo team runs more plays and piles up yards without necessarily being efficient. Cross-check with EPA and Success Rate.", "dir": "high", "dist": {"min": 378.0, "med": 522.0, "max": 646.0, "hi": {"name": "Ole Miss", "abbr": "MISS", "val": 646.0}, "lo": {"name": "Charlotte", "abbr": "CLT", "val": 378.0}}, "dec": 0}, {"name": "Yards Allowed", "def": "Average total yards surrendered per game.", "read": "Lower is better, same tempo caveat as Yards / Game.", "dir": "low", "dist": {"min": 327.0, "med": 512.0, "max": 638.0, "hi": {"name": "Sam Houston", "abbr": "SHSU", "val": 638.0}, "lo": {"name": "Ohio State", "abbr": "OSU", "val": 327.0}}, "dec": 0}]}, {"name": "Advanced Efficiency", "stats": [{"name": "EPA / Play (Off)", "def": "Expected Points Added per offensive play. Every game state (down, distance, field position) has an expected point value; EPA is how much a play changes it, averaged over the season.", "read": "Around zero is average; elite offenses live near +0.20. The most predictive single efficiency number and the biggest driver of the game win-prob model.", "dir": "high", "dist": {"min": -0.241, "med": 0.032, "max": 0.306, "hi": {"name": "Vanderbilt", "abbr": "VAN", "val": 0.306}, "lo": {"name": "Charlotte", "abbr": "CLT", "val": -0.241}}, "dec": 3}, {"name": "EPA / Play (Def)", "def": "Expected Points Added allowed per defensive play.", "read": "Negative is good \u2014 it means the defense is taking expected points away from offenses. On the profile radar this axis is inverted so 'more is better'.", "dir": "low", "dist": {"min": -0.378, "med": 0.002, "max": 0.248, "hi": {"name": "Air Force", "abbr": "AF", "val": 0.248}, "lo": {"name": "Texas Tech", "abbr": "TTU", "val": -0.378}}, "dec": 3}, {"name": "Net EPA / Play", "def": "Offensive EPA/play minus defensive EPA/play allowed \u2014 one efficiency number for the whole team.", "read": "The cleanest one-line efficiency summary; strongly tracks SP+.", "dir": "high", "dist": {"min": -0.382, "med": 0.031, "max": 0.434, "hi": {"name": "Ohio State", "abbr": "OSU", "val": 0.434}, "lo": {"name": "Massachusetts", "abbr": "MASS", "val": -0.382}}, "dec": 3}, {"name": "Success Rate % (Off)", "def": "Share of plays that are 'successful' \u2014 50%+ of needed yards on 1st down, 70%+ on 2nd, 100% on 3rd/4th.", "read": "Measures consistency (staying on schedule) rather than explosiveness. ~45%+ is strong. A team can have high EPA from a few huge plays but a mediocre Success Rate \u2014 that's a boom-or-bust profile.", "dir": "high", "dist": {"min": 32.0, "med": 42.0, "max": 53.0, "hi": {"name": "Indiana", "abbr": "IU", "val": 53.0}, "lo": {"name": "Ball State", "abbr": "BALL", "val": 32.0}}, "dec": 0}, {"name": "Success Rate % (Def)", "def": "Share of opponent plays that were successful.", "read": "Lower is better. Shown on the efficiency split as the rate the defense allows.", "dir": "low", "dist": {"min": 27.0, "med": 41.0, "max": 54.0, "hi": {"name": "Charlotte", "abbr": "CLT", "val": 54.0}, "lo": {"name": "Texas Tech", "abbr": "TTU", "val": 27.0}}, "dec": 0}, {"name": "Explosiveness", "def": "The rate of explosive plays \u2014 snaps gaining 15+ yards (garbage time excluded).", "read": "The big-play dimension of an offense. On the radar it's a 0\u2013100 percentile versus FBS. High Success Rate + high Explosiveness is the ideal offense.", "dir": "high"}]}, {"name": "Schedule & Talent", "stats": [{"name": "Strength of Schedule", "def": "Rank by the average SP+ rating of the opponents a team actually played (1 = toughest slate). Computed from opponents faced because SP+'s own SoS field was empty for 2025.", "read": "Read every counting stat through this lens \u2014 gaudy scoring against a #120 schedule means less than solid numbers against a #10 one. Feeds the win-prob models as sos_diff.", "dir": "rank"}, {"name": "Recruiting Rank", "def": "The team's 247Sports recruiting-class rank (1 = best incoming talent).", "read": "A proxy for raw talent on the roster. The recruiting model shows it explains ~37% of the variance in team rating \u2014 real signal, far from the whole story.", "dir": "rank", "dist": {"min": 1, "med": 15, "max": 29, "hi": {"name": "Kentucky", "abbr": "UK", "val": 29}, "lo": {"name": "Texas", "abbr": "TEX", "val": 1}}, "dec": 0}]}, {"name": "Projection", "stats": [{"name": "2026 Projected Wins", "def": "Expected wins next season from the preseason priors model, which forecasts games before any 2026 form exists using prior-year strength, returning talent and recruiting.", "read": "A preseason expectation, not a guarantee \u2014 read it as 'about this many wins if the season played out as expected.' The gauge on the dashboard visualizes it.", "dir": "high", "dist": {"min": 1.8, "med": 5.3, "max": 9.4, "hi": {"name": "Notre Dame", "abbr": "ND", "val": 9.4}, "lo": {"name": "Massachusetts", "abbr": "MASS", "val": 1.8}}, "dec": 1}]}, {"name": "Team Profile Radar (0\u2013100 percentiles vs FBS)", "stats": [{"name": "OFF", "def": "Offensive EPA/play, ranked as a percentile across FBS.", "read": "100 = best offense in the country, 50 = median.", "dir": "high"}, {"name": "DEF", "def": "Defensive EPA/play allowed, inverted so a higher percentile = a better defense.", "read": "100 = stingiest defense in FBS.", "dir": "high"}, {"name": "ST", "def": "Special-teams rating percentile (from SP+'s special-teams component).", "read": "Kicking, returns and field position, relative to FBS.", "dir": "high"}, {"name": "EXP", "def": "Explosive-play-rate percentile (15+ yard plays).", "read": "The big-play axis of the profile.", "dir": "high"}, {"name": "EFF", "def": "Offensive Success Rate percentile.", "read": "The stay-on-schedule / consistency axis.", "dir": "high"}, {"name": "TAL", "def": "Talent percentile from recruiting rank (better rank = higher percentile).", "read": "Roster-talent axis; the recruiting model links this to on-field results.", "dir": "high"}]}]};
const DIR = {
  high:{cls:'good', txt:'Higher is better'},
  low:{cls:'low', txt:'Lower is better'},
  rank:{cls:'rank', txt:'Lower rank is better'},
};

document.getElementById('sub').textContent =
  `Every metric on the comparison dashboard, in plain English — what it measures, how to read it, `
  + `and where each of the ${DATA.nTeams} FBS teams landed in ${DATA.season}.`;
document.getElementById('fseason').textContent = DATA.season;

function distBar(d, dir, dec){
  if(!d) return '';
  const span = (d.max - d.min) || 1;
  const medPct = ((d.med - d.min) / span * 100).toFixed(1);
  // for "higher is better" the top value leads; for "lower"/"rank" the bottom value leads
  const highGood = (dir === 'high');
  const leader = highGood ? d.hi : d.lo, trailer = highGood ? d.lo : d.hi;
  const goodDot = '<span class="dot" style="background:var(--a);"></span>';
  const badDot = '<span class="dot" style="background:var(--sub);"></span>';
  const fmt = v => (typeof v === 'number' ? v.toLocaleString(undefined,{maximumFractionDigits:dec}) : v);
  return `<div class="dist">
    <div class="track"><div class="med" style="left:${medPct}%;" title="median ${fmt(d.med)}"></div></div>
    <div class="ends"><span>min ${fmt(d.min)}</span><span>median ${fmt(d.med)}</span><span>max ${fmt(d.max)}</span></div>
    <div class="ex">
      <span class="chip">${goodDot}Leader <b>${leader.abbr} ${fmt(leader.val)}</b></span>
      <span class="chip">${badDot}Trailer <b>${trailer.abbr} ${fmt(trailer.val)}</b></span>
    </div></div>`;
}

function cardHtml(s){
  const dir = DIR[s.dir] || DIR.high;
  return `<div class="card" data-search="${(s.name+' '+s.def+' '+s.read).toLowerCase()}">
    <div class="top"><span class="name">${s.name}</span><span class="badge ${dir.cls}">${dir.txt}</span></div>
    <div class="def">${s.def}</div>
    <div class="read"><b>How to read it:</b> ${s.read}</div>
    ${distBar(s.dist, s.dir, s.dec ?? 1)}
  </div>`;
}

function render(filter){
  const f = (filter||'').trim().toLowerCase();
  let shown = 0, total = 0;
  const html = DATA.groups.map(g=>{
    const cards = g.stats.map(s=>{
      total++;
      const hay = (s.name+' '+s.def+' '+s.read).toLowerCase();
      if(f && !hay.includes(f)) return '';
      shown++;
      return cardHtml(s);
    }).join('');
    if(!cards) return '';
    return `<div class="sec"><h2>${g.name}</h2><span class="line"></span></div><div class="grid">${cards}</div>`;
  }).join('');
  document.getElementById('body').innerHTML = html || '<div class="empty">No stats match “'+f+'”.</div>';
  document.getElementById('count').textContent = f ? `${shown} of ${total} stats` : `${total} stats`;
}

document.getElementById('q').addEventListener('input', e=>render(e.target.value));
render('');
</script>
</body>
</html>
