/* ---------- color helpers (ported from the wireframe) ---------- */
function lum(hex){ try{ const c=hex.replace('#','');
  const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  return (0.299*r+0.587*g+0.114*b)/255; }catch(e){ return .5; } }
function txtOn(hex){ return lum(hex)>0.6 ? '#0c0d11' : '#ffffff'; }
function accent(t){ let a=t.primary; if(lum(a)<0.17){ a=(t.secondary&&lum(t.secondary)>0.2)?t.secondary:'#d7dee8'; } return a; }
const GOOD='#3ddc84', BAD='#ff6b6b';

/* ---------- normal CDF for the win-prob mapping ---------- */
function normCdf(z){ const t=1/(1+0.2316419*Math.abs(z)); const d=0.3989423*Math.exp(-z*z/2);
  let p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.821256+t*1.330274)))); return z>0?1-p:p; }

/* ---------- crest = team-coloured badge holding the real logo ---------- */
function crest(t,size){
  const acc=accent(t);
  return `<div class="crest" style="width:${size}px;height:${size*1.1}px;
    background:linear-gradient(150deg, ${t.primary} 0%, color-mix(in srgb, ${t.primary} 55%, #06070a) 100%);
    border-color:${acc};">
    <img src="${t.logo}" alt="${t.name} logo" loading="lazy"
      onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'${t.abbr}',style:'font:800 ${size*0.3}px \\'Saira Condensed\\';color:${txtOn(t.primary)}'}))">
  </div>`;
}

/* ---------- charts (SVG strings) ---------- */
function radar(A,B,accA,accB){
  const S=210,c=S/2,R=68, keys=['off','def','st','exp','eff','tal'], labs=['OFF','DEF','ST','EXP','EFF','TAL'];
  const grid='rgba(255,255,255,.09)', sub='#8a96a8';
  const pt=(i,r)=>{const a=(-90+i*60)*Math.PI/180;return [c+r*Math.cos(a),c+r*Math.sin(a)];};
  const poly=(t)=>keys.map((k,i)=>pt(i,R*(t.radar[k]||0)/100).join(',')).join(' ');
  let rings=[0.33,0.66,1].map(f=>`<polygon points="${keys.map((k,j)=>pt(j,R*f).join(',')).join(' ')}" fill="none" stroke="${grid}" stroke-width="1"/>`).join('');
  let axes=keys.map((k,i)=>{const[x,y]=pt(i,R);return `<line x1="${c}" y1="${c}" x2="${x}" y2="${y}" stroke="${grid}" stroke-width="1"/>`;}).join('');
  let labels=labs.map((L,i)=>{const[x,y]=pt(i,R+14);return `<text x="${x}" y="${y}" fill="${sub}" font-size="10" font-weight="600" font-family="Space Grotesk" text-anchor="middle" dominant-baseline="middle">${L}</text>`;}).join('');
  let dots=keys.map((k,i)=>{const[x,y]=pt(i,R*(A.radar[k]||0)/100);return `<circle cx="${x}" cy="${y}" r="3" fill="${accA}"/>`;}).join('');
  return `<svg viewBox="0 0 ${S} ${S}" style="width:100%;max-width:220px;display:block;margin:4px auto 0;">
    ${rings}${axes}${labels}
    <polygon points="${poly(B)}" fill="${accB}" fill-opacity=".14" stroke="${accB}" stroke-width="2" stroke-dasharray="4 3"/>
    <polygon points="${poly(A)}" fill="${accA}" fill-opacity=".28" stroke="${accA}" stroke-width="2.5"/>${dots}</svg>`;
}
function gauge(A,B,accA,accB){                          // repurposed: projected 2026 wins (of ~13)
  const W=220,H=130,cx=W/2,cy=112,r=84, track='rgba(255,255,255,.08)', text='#f3f6fb', sub='#8a96a8', panel='#12151d';
  const pa=Math.max(0,Math.min(1,(A.proj2026||0)/13)), pb=Math.max(0,Math.min(1,(B.proj2026||0)/13));
  const pol=(deg)=>{const a=deg*Math.PI/180;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];};
  const arc=(a0,a1)=>{const[x0,y0]=pol(a0),[x1,y1]=pol(a1);const big=(a1-a0)>180?1:0;return `M ${x0} ${y0} A ${r} ${r} 0 ${big} 1 ${x1} ${y1}`;};
  const [bx,by]=pol(180+180*pb);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:230px;display:block;margin:0 auto;">
    <path d="${arc(180,360)}" fill="none" stroke="${track}" stroke-width="14" stroke-linecap="round"/>
    <path d="${arc(180,180+180*pa)}" fill="none" stroke="${accA}" stroke-width="14" stroke-linecap="round"/>
    <circle cx="${bx}" cy="${by}" r="6" fill="${panel}" stroke="${accB}" stroke-width="3"/>
    <text x="${cx}" y="${cy-16}" fill="${text}" font-size="40" font-weight="800" font-family="Saira Condensed" text-anchor="middle">${A.proj2026!=null?A.proj2026.toFixed(1):'—'}</text>
    <text x="${cx}" y="${cy+2}" fill="${sub}" font-size="10" font-weight="600" font-family="Space Grotesk" letter-spacing=".12em" text-anchor="middle">2026 PROJ. WINS</text></svg>`;
}
function trend(A,B,accA,accB){
  const W=1120,H=230,padL=30,padR=14,padT=16,padB=26, grid='rgba(255,255,255,.09)', sub='#8a96a8', panel='#12151d';
  const a=A.margins||[], b=B.margins||[], all=a.concat(b);
  const n=Math.max(a.length,b.length,2);
  const mx=Math.max(...all,7), mn=Math.min(...all,-7);
  const x=(i,len)=>padL+i*(W-padL-padR)/Math.max(len-1,1);
  const y=(v)=>padT+(mx-v)*(H-padT-padB)/((mx-mn)||1);
  const path=(arr)=>arr.map((v,i)=>(i?'L':'M')+x(i,arr.length)+' '+y(v)).join(' ');
  const zero=y(0);
  const gy=[mx,Math.round((mx+mn)/2),mn];
  let grids=gy.map((v,i)=>`<line x1="${padL}" y1="${y(v)}" x2="${W-padR}" y2="${y(v)}" stroke="${grid}" stroke-width="1" stroke-dasharray="${i===1?'none':'3 4'}" opacity="${i===1?.9:.5}"/>
    <text x="${padL-6}" y="${y(v)+3}" fill="${sub}" font-size="11" font-family="JetBrains Mono" text-anchor="end">${(v>0?'+':'')+v}</text>`).join('');
  let gx=Array.from({length:n},(_,i)=>`<text x="${x(i,n)}" y="${H-6}" fill="${sub}" font-size="10" font-family="Space Grotesk" text-anchor="middle">G${i+1}</text>`).join('');
  let bdots=b.map((v,i)=>`<circle cx="${x(i,b.length)}" cy="${y(v)}" r="3" fill="${panel}" stroke="${accB}" stroke-width="2"/>`).join('');
  let adots=a.map((v,i)=>`<circle cx="${x(i,a.length)}" cy="${y(v)}" r="3.5" fill="${accA}"/>`).join('');
  const area=a.length?path(a)+` L ${x(a.length-1,a.length)} ${zero} L ${x(0,a.length)} ${zero} Z`:'';
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;" preserveAspectRatio="none">
    ${grids}${gx}
    <path d="${area}" fill="${accA}" fill-opacity=".10"/>
    <path d="${path(b)}" fill="none" stroke="${accB}" stroke-width="2.5" stroke-dasharray="5 4" opacity=".9"/>
    <path d="${path(a)}" fill="none" stroke="${accA}" stroke-width="3"/>${bdots}${adots}</svg>`;
}

/* ---------- derived tables ---------- */
function predict(A,B){
  const spread=+(A.spPlus-B.spPlus).toFixed(1), favA=spread>=0, fav=favA?A:B, dog=favA?B:A, abs=Math.abs(spread);
  const pA=normCdf((A.spPlus-B.spPlus)/DATA.marginSd);
  const total=Math.round((A.ppg+B.oppPpg+B.ppg+A.oppPpg)/2);
  const favPts=Math.round(total/2+abs/2), dogPts=Math.round(total/2-abs/2);
  return {favAbbr:fav.abbr,favName:fav.name,favA,spreadDisp:abs<1?'PK':'-'+abs.toFixed(1),
    scoreDisp:`${fav.abbr} ${favPts}–${dogPts} ${dog.abbr}`, aWin:Math.round(pA*100), bWin:Math.round((1-pA)*100)};
}
function kpis(A,B){
  const rows=[
    {label:'SP+ Rating',a:A.spPlus,b:B.spPlus,hi:true,dec:1,sign:true},
    {label:'Points / Game',a:A.ppg,b:B.ppg,hi:true,dec:1},
    {label:'Points Allowed',a:A.oppPpg,b:B.oppPpg,hi:false,dec:1},
    {label:'EPA / Play',a:A.epaOff,b:B.epaOff,hi:true,dec:2}];
  return rows.map(r=>{const good=r.hi?r.a>r.b:r.a<r.b,diff=Math.abs(r.a-r.b);
    const f=v=>(r.sign&&v>=0?'+':'')+v.toFixed(r.dec);
    return {label:r.label,aDisp:f(r.a),bDisp:f(r.b),deltaDisp:(good?'▲':'▼')+diff.toFixed(r.dec),deltaColor:good?GOOD:BAD};});
}
function ledger(A,B){
  const neu='var(--text)';
  const rows=[
    {label:'SP+ Rating',a:A.spPlus,b:B.spPlus,hi:true,dec:1,sign:true},
    {label:'Points / Game',a:A.ppg,b:B.ppg,hi:true,dec:1},
    {label:'Points Allowed',a:A.oppPpg,b:B.oppPpg,hi:false,dec:1},
    {label:'Yards / Game',a:A.ypg,b:B.ypg,hi:true,dec:0},
    {label:'Yards Allowed',a:A.oppYpg,b:B.oppYpg,hi:false,dec:0},
    {label:'EPA / Play (Off)',a:A.epaOff,b:B.epaOff,hi:true,dec:2,sign:true},
    {label:'EPA / Play (Def)',a:A.epaDef,b:B.epaDef,hi:false,dec:2,sign:true},
    {label:'Success Rate %',a:A.srOff,b:B.srOff,hi:true,dec:0,suf:'%'},
    {label:'Strength of Sched',a:A.sosRank,b:B.sosRank,hi:false,rank:true},
    {label:'Recruiting Rank',a:A.recruitRank,b:B.recruitRank,hi:false,rank:true},
    {label:'2026 Proj. Wins',a:A.proj2026,b:B.proj2026,hi:true,dec:1}];
  return rows.map(r=>{
    const na=r.a==null, nb=r.b==null;
    const f=(v)=> v==null?'—':(r.rank?'#'+v:((r.sign&&v>=0?'+':'')+(+v).toFixed(r.dec)+(r.suf||'')));
    const goodA=(na||nb)?false:(r.hi?r.a>=r.b:r.a<=r.b);
    let av,bv;
    if(na||nb){av=bv=1;} else if(r.rank){av=1/r.a;bv=1/r.b;} else {const off=Math.min(r.a,r.b)*0.6;av=Math.max(r.a-off,.01);bv=Math.max(r.b-off,.01);}
    const tot=av+bv;
    return {label:r.label,aDisp:f(r.a),bDisp:f(r.b),aColor:goodA?GOOD:neu,bColor:(!goodA&&!na&&!nb)?GOOD:neu,
      aBar:(av/tot*100).toFixed(1)+'%',bBar:(bv/tot*100).toFixed(1)+'%'};});
}
function effBars(A,B){
  const rows=[
    {label:'Off Success Rate',a:A.srOff,b:B.srOff,max:60,disp:Math.round(A.srOff)+'%'},
    {label:'Def Success Rate (allow)',a:100-A.srDef,b:100-B.srDef,max:60,disp:Math.round(A.srDef)+'%'},
    {label:'Off EPA/play',a:(A.epaOff*100),b:(B.epaOff*100),max:35,disp:A.epaOff.toFixed(2)},
    {label:'Explosiveness (pct)',a:A.radar.exp,b:B.radar.exp,max:100,disp:Math.round(A.radar.exp)}];
  return rows.map(r=>({label:r.label,aDisp:r.disp,
    aPct:Math.min(r.a/r.max*100,100).toFixed(0)+'%',bPct:Math.min(r.b/r.max*100,100).toFixed(0)+'%'}));
}

/* ---------- state + render ---------- */
const state={ a: DATA.teams[0].id, b: DATA.teams[3] ? DATA.teams[3].id : DATA.teams[1].id, mode:'overlay' };
const byId={}; DATA.teams.forEach(t=>byId[t.id]=t);

function optionList(sel){ return DATA.teams.slice().sort((x,y)=>x.name.localeCompare(y.name))
  .map(t=>`<option value="${t.id}"${t.id===sel?' selected':''}>${t.name}</option>`).join(''); }

function render(){
  const A=byId[state.a], B=byId[state.b], side=state.mode==='side';
  let accA=accent(A), accB=accent(B); if(accB.toLowerCase()===accA.toLowerCase()) accB=B.secondary||'#8aa8c8';
  const aText=txtOn(accA), bText=txtOn(accB);
  const vars=`--a:${accA};--a2:color-mix(in srgb,${accA} 55%,#06070a);--aText:${aText};--b:${accB};--bText:${bText};
    --favColor:${A.spPlus>=B.spPlus?'var(--a)':'var(--b)'};--text:#f3f6fb;--sub:#8a96a8;--border:rgba(255,255,255,.09);--panel:#12151d;--panel2:#0c0e14;`;
  const pred=predict(A,B), K=kpis(A,B), L=ledger(A,B), E=effBars(A,B);
  const chip=(txt,solid,col)=>`<span style="white-space:nowrap;font:700 13px 'Saira Condensed';letter-spacing:.06em;padding:5px 11px;border-radius:999px;${solid?`background:${col};color:${col===accA?aText:bText};`:'background:var(--panel2);border:1px solid var(--border);'}">${txt}</span>`;
  const rankDisp=t=>t.spRank?('SP+ #'+t.spRank):'NR';
  const leaderCard=(t,acc)=>`<div class="panel" style="background:linear-gradient(160deg,color-mix(in srgb,${acc} 16%,var(--panel)),var(--panel) 55%);padding:16px 18px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">${crest(t,30)}<span style="font:400 22px 'Anton';text-transform:uppercase;">${t.name}</span></div>
      ${[['PASSING',t.leaders.pass],['RUSHING',t.leaders.rush],['RECEIVING',t.leaders.rec]].map(([role,l])=>`
        <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--border);">
          <span style="font:700 11px 'Space Grotesk';letter-spacing:.06em;color:${acc};width:78px;flex-shrink:0;">${role}</span>
          <div style="flex:1;min-width:0;"><div style="font:700 16px 'Saira Condensed';">${l[0]}</div>
          <div style="font:500 12px 'JetBrains Mono';color:var(--sub);">${l[1]}</div></div></div>`).join('')}</div>`;

  const app=document.getElementById('app');
  app.style.cssText=`${vars}min-height:100vh;background:radial-gradient(140% 60% at 50% 0%,color-mix(in srgb,var(--a) 20%,#06070a) 0%,#06070a 52%);color:var(--text);padding-bottom:60px;animation:cfbrise .4s ease;`;
  app.innerHTML=`
  <!-- control bar -->
  <div style="position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(8,9,13,.82);border-bottom:1px solid var(--border);">
    <div class="wrap" style="display:flex;align-items:center;gap:14px;padding:12px 26px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:9px;">
        <span style="width:9px;height:26px;border-radius:3px;background:linear-gradient(var(--a),var(--a2));"></span>
        <span style="font:800 15px 'Saira Condensed';letter-spacing:.14em;">GRIDIRON<span style="color:var(--a);">IQ</span></span>
        <span style="font:600 10px 'Space Grotesk';letter-spacing:.16em;color:var(--sub);padding-left:6px;">${DATA.season} SEASON</span>
      </div>
      <div style="display:flex;gap:2px;flex-wrap:wrap;">
        <a href="glossary.html" style="font:600 12px 'Space Grotesk';color:var(--sub);padding:7px 11px;border-radius:8px;text-decoration:none;">Stat Guide</a>
        <a href="models.html" style="font:600 12px 'Space Grotesk';color:var(--sub);padding:7px 11px;border-radius:8px;text-decoration:none;">The Models</a>
      </div>
      <div style="flex:1;"></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="width:11px;height:11px;border-radius:3px;background:var(--a);"></span>
        <select id="selA" style="font:600 13px 'Space Grotesk';padding:9px 12px;border-radius:9px;border:1px solid var(--a);background:color-mix(in srgb,var(--a) 14%,transparent);color:var(--text);">${optionList(state.a)}</select>
        <span style="font:800 12px 'Space Grotesk';color:var(--sub);">VS</span>
        <select id="selB" style="font:600 13px 'Space Grotesk';padding:9px 12px;border-radius:9px;border:1px solid var(--b);background:color-mix(in srgb,var(--b) 14%,transparent);color:var(--text);">${optionList(state.b)}</select>
        <span style="width:11px;height:11px;border-radius:3px;background:var(--b);"></span>
      </div>
      <div style="display:inline-flex;padding:3px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);">
        <button id="mOverlay" style="font:${side?'600':'700'} 12px 'Space Grotesk';padding:8px 14px;border-radius:8px;border:none;cursor:pointer;background:${side?'transparent':'var(--a)'};color:${side?'var(--sub)':'var(--aText)'};">Overlay</button>
        <button id="mSide" style="font:${side?'700':'600'} 12px 'Space Grotesk';padding:8px 14px;border-radius:8px;border:none;cursor:pointer;background:${side?'var(--a)':'transparent'};color:${side?'var(--aText)':'var(--sub)'};">Side&#8202;by&#8202;side</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <!-- hero -->
    <div class="hero" style="display:grid;grid-template-columns:1.25fr 1fr;gap:16px;margin-top:26px;">
      <div style="position:relative;overflow:hidden;border-radius:20px;border:1px solid var(--border);background:linear-gradient(115deg,color-mix(in srgb,var(--a) 32%,var(--panel)) 0%,var(--panel) 58%);padding:22px 24px;">
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(118deg,rgba(255,255,255,.035) 0 2px,transparent 2px 26px);"></div>
        <div style="position:relative;display:flex;align-items:center;gap:20px;">${crest(A,78)}
          <div style="min-width:0;">
            <div style="font:600 12px 'Space Grotesk';letter-spacing:.2em;color:var(--a);text-transform:uppercase;">${A.conference}</div>
            <div style="font:400 clamp(34px,5vw,60px)/.86 'Anton';text-transform:uppercase;margin-top:5px;">${A.name}</div>
            <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">${chip(A.record,true,accA)}${chip(rankDisp(A),false)}${chip('SP+ +'+A.spPlus.toFixed(1),false)}</div>
          </div></div>
      </div>
      <div style="position:relative;overflow:hidden;border-radius:20px;border:1px solid var(--border);background:${side?'linear-gradient(245deg,color-mix(in srgb,var(--b) 32%,var(--panel)) 0%,var(--panel) 58%)':'var(--panel)'};padding:20px 22px;display:flex;flex-direction:column;justify-content:center;">
        ${side?`<div style="display:flex;align-items:center;gap:16px;">${crest(B,64)}
            <div style="min-width:0;"><div style="font:600 12px 'Space Grotesk';letter-spacing:.2em;color:var(--b);text-transform:uppercase;">${B.conference}</div>
            <div style="font:400 clamp(28px,4vw,48px)/.86 'Anton';text-transform:uppercase;margin-top:5px;">${B.name}</div>
            <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">${chip(B.record,true,accB)}${chip(rankDisp(B),false)}</div></div></div>`
        :`<div><div style="font:600 11px 'Space Grotesk';letter-spacing:.16em;color:var(--sub);">MODEL PROJECTION · NEUTRAL FIELD</div>
            <div style="display:flex;align-items:baseline;gap:10px;margin-top:8px;">
              <span style="font:400 46px/1 'Anton';color:var(--favColor);">${pred.favAbbr}</span>
              <span style="font:800 40px 'Saira Condensed';">${pred.spreadDisp}</span></div>
            <div style="font:500 13px 'Space Grotesk';color:var(--sub);margin-top:4px;">Projected ${pred.scoreDisp} · ${pred.favName} favored</div>
            <div style="display:flex;gap:18px;margin-top:14px;">
              <div><div style="font:800 24px 'Saira Condensed';color:var(--a);">${pred.aWin}%</div><div style="font:600 10px 'Space Grotesk';letter-spacing:.1em;color:var(--sub);">${A.abbr} WIN</div></div>
              <div><div style="font:800 24px 'Saira Condensed';color:var(--b);">${pred.bWin}%</div><div style="font:600 10px 'Space Grotesk';letter-spacing:.1em;color:var(--sub);">${B.abbr} WIN</div></div></div></div>`}
      </div>
    </div>

    <!-- KPIs -->
    <div class="kpis" style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:16px;">
      ${K.map(m=>`<div class="panel" style="padding:16px 18px;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--a),color-mix(in srgb,var(--a) 20%,transparent));"></div>
        <div style="font:600 11px 'Space Grotesk';letter-spacing:.1em;color:var(--sub);text-transform:uppercase;">${m.label}</div>
        <div style="display:flex;align-items:baseline;gap:9px;margin-top:10px;"><span style="font:800 34px/1 'Saira Condensed';">${m.aDisp}</span><span style="font:700 13px 'JetBrains Mono';color:${m.deltaColor};">${m.deltaDisp}</span></div>
        <div style="display:flex;align-items:center;gap:7px;margin-top:9px;"><span style="width:8px;height:8px;border-radius:2px;background:var(--b);"></span><span style="font:500 12px 'JetBrains Mono';color:var(--sub);">${B.abbr} ${m.bDisp}</span></div></div>`).join('')}
    </div>

    <!-- overview trio -->
    <div class="sec"><h2>Overview</h2><span class="line"></span><span class="hint">2026 PROJECTION · PROFILE · EFFICIENCY</span></div>
    <div class="trio" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;">
      <div class="panel" style="padding:16px 18px;display:flex;flex-direction:column;">
        <div style="font:600 12px 'Space Grotesk';letter-spacing:.1em;color:var(--sub);">2026 WIN PROJECTION</div>
        <div style="flex:1;display:flex;align-items:center;">${gauge(A,B,accA,accB)}</div>
        <div style="display:flex;justify-content:center;gap:16px;"><span style="font:500 11px 'Space Grotesk';color:var(--a);">● ${A.abbr} ${A.proj2026!=null?A.proj2026.toFixed(1):'—'}</span><span style="font:500 11px 'Space Grotesk';color:var(--b);">○ ${B.abbr} ${B.proj2026!=null?B.proj2026.toFixed(1):'—'}</span></div>
      </div>
      <div class="panel" style="padding:16px 18px;"><div style="font:600 12px 'Space Grotesk';letter-spacing:.1em;color:var(--sub);">TEAM PROFILE</div>${radar(A,B,accA,accB)}</div>
      <div class="panel" style="padding:16px 18px;"><div style="font:600 12px 'Space Grotesk';letter-spacing:.1em;color:var(--sub);margin-bottom:8px;">EFFICIENCY SPLIT</div>
        ${E.map(e=>`<div style="margin-bottom:11px;"><div style="display:flex;justify-content:space-between;font:500 11px 'Space Grotesk';color:var(--sub);margin-bottom:4px;"><span>${e.label}</span><span style="font-family:'JetBrains Mono';color:var(--text);">${e.aDisp}</span></div>
          <div style="position:relative;height:8px;border-radius:4px;background:var(--panel2);overflow:hidden;"><div style="position:absolute;left:0;top:0;height:100%;width:${e.bPct};background:var(--b);opacity:.5;border-radius:4px;"></div><div style="position:absolute;left:0;top:0;height:100%;width:${e.aPct};background:var(--a);border-radius:4px;"></div></div></div>`).join('')}</div>
    </div>

    <!-- trend -->
    <div class="sec"><h2>Scoring Margin Trend</h2><span class="line"></span><span class="hint">POINT DIFFERENTIAL · BY GAME</span></div>
    <div class="panel" style="padding:20px 22px;">
      <div style="display:flex;gap:20px;margin-bottom:6px;"><span style="font:600 12px 'Space Grotesk';color:var(--a);">■ ${A.name}</span><span style="font:600 12px 'Space Grotesk';color:var(--b);">■ ${B.name}</span></div>
      ${trend(A,B,accA,accB)}</div>

    <!-- ledger -->
    <div class="sec"><h2>Season Ledger</h2><span class="line"></span><span class="hint">HEAD-TO-HEAD · ADVANCED + TRADITIONAL</span></div>
    <div class="panel" style="overflow:hidden;">
      <div style="display:grid;grid-template-columns:1.6fr 1fr 2.2fr 1fr;padding:11px 20px;border-bottom:1px solid var(--border);background:var(--panel2);">
        <span style="font:600 10px 'Space Grotesk';letter-spacing:.1em;color:var(--sub);">METRIC</span>
        <span style="font:600 10px 'Space Grotesk';letter-spacing:.1em;color:var(--a);text-align:right;">${A.abbr}</span>
        <span style="font:600 10px 'Space Grotesk';letter-spacing:.1em;color:var(--sub);text-align:center;">COMPARISON</span>
        <span style="font:600 10px 'Space Grotesk';letter-spacing:.1em;color:var(--b);text-align:left;padding-left:14px;">${B.abbr}</span>
      </div>
      ${L.map(r=>`<div style="display:grid;grid-template-columns:1.6fr 1fr 2.2fr 1fr;align-items:center;padding:11px 20px;border-bottom:1px solid var(--border);">
        <span style="font:500 13px 'Space Grotesk';">${r.label}</span>
        <span style="font:700 15px 'JetBrains Mono';color:${r.aColor};text-align:right;padding-right:10px;">${r.aDisp}</span>
        <div style="display:flex;align-items:center;gap:3px;"><div style="flex:1;display:flex;justify-content:flex-end;"><div style="height:9px;width:${r.aBar};background:var(--a);border-radius:3px 0 0 3px;"></div></div>
          <div style="width:1px;height:14px;background:var(--sub);"></div>
          <div style="flex:1;display:flex;justify-content:flex-start;"><div style="height:9px;width:${r.bBar};background:var(--b);border-radius:0 3px 3px 0;"></div></div></div>
        <span style="font:700 15px 'JetBrains Mono';color:${r.bColor};text-align:left;padding-left:14px;">${r.bDisp}</span></div>`).join('')}
    </div>

    <!-- players -->
    <div class="sec"><h2>Player Leaders</h2><span class="line"></span><span class="hint">PASSING · RUSHING · RECEIVING</span></div>
    <div class="players" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">${leaderCard(A,accA)}${leaderCard(B,accB)}</div>

    <div style="margin-top:34px;font:500 12px 'Space Grotesk';color:var(--sub);line-height:1.7;">
      ${DATA.season} FBS season. SP+, EPA &amp; efficiency from the <a href="https://github.com/Steve27M/cfb-analytics" style="color:var(--a);">cfb-analytics</a> warehouse;
      neutral-field projection uses the SP+ margin + the project's win model; 2026 win totals are the project's preseason forecast.
      Data: CollegeFootballData.com. Team names &amp; logos are the property of their respective institutions.
    </div>
  </div>`;

  document.getElementById('selA').onchange=e=>{state.a=e.target.value;render();};
  document.getElementById('selB').onchange=e=>{state.b=e.target.value;render();};
  document.getElementById('mOverlay').onclick=()=>{state.mode='overlay';render();};
  document.getElementById('mSide').onclick=()=>{state.mode='side';render();};
}
render();
</script>
</body>
